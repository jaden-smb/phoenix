# Release: pushing a tag `vX.Y.Z` builds every shippable artifact and publishes a GitHub
# release with them attached. The version lives in engine/core/include/phx/core/version.h;
# the first job refuses to publish a tag that disagrees with it. Full flow: RELEASING.md.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # The tag must match the version header — the one the binaries themselves report.
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches phx/core/version.h
        run: |
          ver="$(make -s version)"
          if [ "v$ver" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match version.h (v$ver) — bump the header first (RELEASING.md)"
            exit 1
          fi

  # Host: run the full gate, then package the Linux tools tarball + the CMake SDK tarball.
  linux:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++ make cmake python3
      - name: Full check suite
        run: make check
      - name: Package Linux tools (make dist)
        run: make dist
      - name: Package SDK (headers + libs + tools, cpack)
        run: |
          cmake -S . -B build/pkg -DPHX_TARGET=linux -DCMAKE_BUILD_TYPE=Release
          cmake --build build/pkg -j"$(nproc)"
          cd build/pkg && cpack
      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            build/dist/*.tar.gz
            build/pkg/phoenix-*-sdk-*.tar.gz

  windows:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64 + Wine
        run: sudo apt-get update && sudo apt-get install -y make python3 g++-mingw-w64-x86-64 wine64
      - name: Cross-compile + verify under Wine
        run: |
          make win
          wine build/win/phx_tests.exe
      - name: Package Windows tools zip
        run: make dist-win
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: build/dist/*.zip

  gba:
    needs: verify-version
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install host build tools
        run: apt-get update && apt-get install -y build-essential python3 git
      - name: Enforce ROM budgets (the shipping config)
        run: |
          make size-gate
          make size-gate-emberwing
      - name: Package GBA ROM zip
        run: make dist-gba
      - uses: actions/upload-artifact@v4
        with:
          name: release-gba
          path: build/dist/*.zip

  psp:
    needs: verify-version
    runs-on: ubuntu-latest
    container: pspdev/pspdev:latest
    env:
      PSPDEV: /usr/local/pspdev
    steps:
      - uses: actions/checkout@v4
      - name: Ensure host build tools (handles apt or apk base images)
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y build-essential python3 git
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache build-base python3 git
          fi
      - name: Package PSP EBOOT zip
        run: make dist-psp
      - uses: actions/upload-artifact@v4
        with:
          name: release-psp
          path: build/dist/*.zip

  publish:
    needs: [linux, windows, gba, psp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          find artifacts -type f | sort
          gh release create "$GITHUB_REF_NAME" \
            --title "Phoenix $GITHUB_REF_NAME" \
            --generate-notes \
            $(find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \))
