name: CI

on:
  push:
    branches: [ main ]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Host: build everything and run the full suite (unit + integration + pipeline + tools + the
  # acyclic-dependency gate) on the PC tier, then re-run the foundation suite on the GBA
  # fixed-point tier to assert float/fixed determinism.
  host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++ make python3
      - name: Build + test (PC tier, scalar = float)
        run: make check
      - name: Determinism gate — identical outcomes + frame across scalar tiers
        run: make determinism

  # Sanitizer gate (M7): the full check suite under ASan + UBSan, no recover — any UB or
  # heap error fails the job. Runs in its own build root (build/asan).
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++ make python3
      - name: Full check suite under ASan+UBSan
        run: make sanitize

  # Release gate: the full check suite must also build+pass with PHX_BUILD_RELEASE=1 (own build
  # root build/release) — the config every GBA/PSP job below always ships (see gba-size/psp).
  # Catches e.g. a variable only referenced inside PHX_ASSERT becoming an -Wunused-variable
  # warning once the macro compiles away, on the host instead of only in a console cross build.
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++ make python3
      - name: Full check suite with PHX_BUILD_RELEASE=1
        run: make release

  # Windows: cross-compile the FULL host build (engine + every test/tool binary) to PE32+
  # executables with MinGW-w64, and run the complete unit suite + the platformer under Wine.
  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64 + Wine
        run: sudo apt-get update && sudo apt-get install -y make python3 g++-mingw-w64-x86-64 wine64
      - name: Cross-compile all binaries to Windows PE32+
        run: make win
      - name: Run the unit suite + both full games under Wine
        run: |
          wine build/win/phx_tests.exe
          wine build/win/phx_platformer.exe
          wine build/win/phx_emberwing.exe
          wine build/win/phx_emberwing_ppu.exe

  # GBA: cross-compile both shipping PPU ROMs (the platformer MVP slice + Emberwing, the
  # console proof-of-scale game) and enforce the budget on each (docs/09 MVP gate). The
  # devkitARM image provides the cross toolchain + bin2s; we add the host compiler for the
  # offline asset bake.
  gba-size:
    runs-on: ubuntu-latest
    container: devkitpro/devkitarm:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install host build tools
        run: apt-get update && apt-get install -y build-essential python3 git
      - name: Build platformer PPU ROM + enforce size gate
        run: make size-gate
      - name: Build Emberwing PPU ROM + enforce size gate
        run: make size-gate-emberwing

  # PSP: cross-compile both example EBOOTs (MIPS Allegrex). The pspdev image provides the
  # toolchain + PRX packaging; we add a host compiler + python3 for the offline bake and the
  # portable bin2s (the PSP build deliberately avoids the devkitPro dependency).
  psp:
    runs-on: ubuntu-latest
    container: pspdev/pspdev:latest
    env:
      PSPDEV: /usr/local/pspdev   # the pspdev image's install prefix; adjust if the image moves it
    steps:
      - uses: actions/checkout@v4
      - name: Ensure host build tools (handles apt or apk base images)
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update && apt-get install -y build-essential python3 git
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache build-base python3 git
          fi
      - name: Build PSP platformer EBOOT
        run: make psp-platformer
      - name: Build PSP Emberwing EBOOT
        run: make psp-emberwing
